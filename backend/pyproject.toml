[project]
name = "mise-backend"
version = "0.1.0"
description = "Mise — Restaurant ERP backend"
requires-python = ">=3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "-ra -q"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]
ignore = ["B008"]  # FastAPI uses function calls (Depends()) in defaults by design

[tool.ruff.lint.per-file-ignores]
# Alembic autogenerated migrations have long create_table lines — not worth wrapping.
"alembic/versions/*" = ["E501"]

[tool.coverage.run]
source = ["app"]
omit = ["app/main.py", "app/scripts/*", "tests/*"]
