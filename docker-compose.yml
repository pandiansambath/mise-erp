name: mise

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mise
      POSTGRES_USER: mise
      POSTGRES_PASSWORD: mise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mise -d mise"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      DATABASE_URL: postgresql+asyncpg://mise:mise@db:5432/mise
      SECRET_KEY: dev-only-secret-change-me
      ENVIRONMENT: local
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
