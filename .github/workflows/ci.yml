name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, migrate, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mise_test
          POSTGRES_USER: mise
          POSTGRES_PASSWORD: mise
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mise"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations against Postgres
        env:
          DATABASE_URL: postgresql+asyncpg://mise:mise@localhost:5432/mise_test
          SECRET_KEY: ci-secret
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=70
