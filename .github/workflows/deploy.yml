name: Deploy (eu-west-2)

# Manual trigger so deployments (and AWS spend) are always intentional.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  STATE_BUCKET: mise-tfstate-765607524925

jobs:
  # ── Test gate: nothing deploys unless backend + frontend are green ──
  test-backend:
    name: Test · backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mise_test
          POSTGRES_USER: mise
          POSTGRES_PASSWORD: mise
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mise"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - name: Migrate + test
        env:
          DATABASE_URL: postgresql+asyncpg://mise:mise@localhost:5432/mise_test
          SECRET_KEY: ci-secret
        run: |
          alembic upgrade head
          pytest -q --cov=app --cov-fail-under=70

  test-frontend:
    name: Test · frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy:
    name: Build images + Terraform apply
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap state bucket + ECR repos (idempotent)
        run: |
          aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null || \
            aws s3api create-bucket --bucket "$STATE_BUCKET" --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" \
            --versioning-configuration Status=Enabled || true
          for r in mise-backend mise-frontend; do
            aws ecr describe-repositories --repository-names "$r" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$r" \
                --image-scanning-configuration scanOnPush=true >/dev/null
          done

      - name: ECR login
        id: ecr
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REG="$ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com"
          echo "registry=$REG" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password | docker login --username AWS --password-stdin "$REG"

      # Push BOTH :<sha> (immutable record / rollback) and :latest. The box's compose
      # pins :latest so a normal code deploy DOESN'T change user_data -> the EC2 box is
      # NOT rebuilt; we roll the new images in-place via SSM instead (seconds, not mins).
      - name: Build & push backend image
        run: |
          SHA="${{ steps.ecr.outputs.registry }}/mise-backend:${{ github.sha }}"
          LATEST="${{ steps.ecr.outputs.registry }}/mise-backend:latest"
          docker build --target prod --build-arg APP_COMMIT="${{ github.sha }}" -t "$SHA" -t "$LATEST" ./backend
          docker push "$SHA"
          docker push "$LATEST"
          echo "BACKEND_IMAGE=$LATEST" >> "$GITHUB_ENV"

      - name: Build & push frontend image
        # Same-origin behind Caddy on the EC2 box -> relative /api (empty base).
        run: |
          SHA="${{ steps.ecr.outputs.registry }}/mise-frontend:${{ github.sha }}"
          LATEST="${{ steps.ecr.outputs.registry }}/mise-frontend:latest"
          docker build --build-arg NEXT_PUBLIC_API_URL="" -t "$SHA" -t "$LATEST" ./frontend
          docker push "$SHA"
          docker push "$LATEST"
          echo "FRONTEND_IMAGE=$LATEST" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform apply (EC2 + RDS + networking)
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_app_secret_key: ${{ secrets.APP_SECRET_KEY }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_stripe_price_id: ${{ secrets.STRIPE_PRICE_ID }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_gemini_api_key_2: ${{ secrets.GEMINI_API_KEY_2 }}
          # HTTPS: set repo variables SITE_DOMAIN + ACME_EMAIL once DNS points at
          # the box's Elastic IP; empty = plain HTTP on :80 (no cert attempt).
          TF_VAR_domain: ${{ vars.SITE_DOMAIN }}
          TF_VAR_acme_email: ${{ vars.ACME_EMAIL }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="backend_image=$BACKEND_IMAGE" \
            -var="frontend_image=$FRONTEND_IMAGE"

      # Normal code deploys don't change user_data (images are pinned to :latest), so
      # Terraform leaves the box running. Pull the new images + recreate the app
      # containers in place via SSM — a few seconds of blip instead of a full rebuild.
      # (On the rare deploy that DOES change user_data — e.g. a secret — Terraform
      # replaces the box and this step is just a no-op re-pull.)
      - name: Roll out new images in-place (no box rebuild)
        env:
          REG: ${{ steps.ecr.outputs.registry }}
        run: |
          IID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=mise-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          echo "App instance: $IID"
          # A just-replaced box needs a moment before its SSM agent reports in.
          for i in $(seq 1 20); do
            PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$IID" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null || echo "")
            [ "$PING" = "Online" ] && break
            echo "waiting for SSM agent ($i/20)…"; sleep 15
          done
          jq -n --arg reg "$REG" --arg region "$AWS_REGION" '{commands: [
            "set -eux",
            "cloud-init status --wait || true",
            "cd /opt/mise",
            ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $reg),
            "docker compose pull",
            "docker compose up -d",
            "docker image prune -f || true"
          ]}' > rollout.json
          CMD=$(aws ssm send-command --instance-ids "$IID" \
            --document-name AWS-RunShellScript --parameters file://rollout.json \
            --query Command.CommandId --output text)
          echo "SSM command: $CMD"
          # `aws ssm wait` gives up after ~100s, but a box-replace boot (cloud-init
          # + first image pulls) can take several minutes — poll up to 12 min.
          for i in $(seq 1 72); do
            ST=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$ST" in Success|Failed|Cancelled|TimedOut|DeliveryTimedOut) break;; esac
            echo "rollout $ST ($i/72)…"; sleep 10
          done
          echo "----- rollout output -----"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query StandardOutputContent --output text
          echo "----- rollout status: $ST -----"
          if [ "$ST" != "Success" ]; then
            aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query StandardErrorContent --output text
            exit 1
          fi

      - name: Summary
        working-directory: infra
        run: |
          {
            echo "### 🚀 Mise deployed to eu-west-2"
            echo "- **App:** $(terraform output -raw app_url)"
            echo ""
            echo "_Images rolled in place via SSM (no box rebuild) — live within seconds._"
          } >> "$GITHUB_STEP_SUMMARY"
